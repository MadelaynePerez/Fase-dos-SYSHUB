<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SysHub — Nueva publicación</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="topbar">
  <a class="topbar-brand" href="feed.html">🛰️ SYSHUB</a>
  <div class="topbar-right">
    <span id="topbar-nombre" style="font-size:13px;color:var(--text-muted)"></span>
    <div class="avatar" id="topbar-avatar" onclick="window.location='perfil.html'"></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <span class="sidebar-label">Navegar</span>
    <a class="nav-btn" href="feed.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Feed</a>
    <a class="nav-btn" href="foros.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Foros</a>
    <a class="nav-btn active" href="proyecto-nuevo.html"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nueva publicación</a>
  </nav>

  <main class="main" style="max-width:680px">
    <div>
      <h1 class="section-title">Nueva publicación</h1>
      <p class="section-sub">Comparte un proyecto, práctica o artículo con la comunidad</p>
    </div>

    <!-- TIPO SELECTOR -->
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" id="tipo-proyecto" onclick="setTipo('proyecto')">📁 Proyecto / Práctica</button>
      <button class="btn btn-ghost"   id="tipo-articulo" onclick="setTipo('articulo')">📝 Artículo / Tutorial</button>
    </div>

    <!-- FORM PROYECTO -->
    <div class="card-flat" id="form-proyecto">
      <div class="form-group">
        <label class="form-label">Título *</label>
        <input class="form-input" id="p-titulo" placeholder="Ej: Compilador léxico-sintáctico en C++"/>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción *</label>
        <textarea class="form-input" id="p-desc" rows="4" placeholder="Describe brevemente tu proyecto, qué hace, cómo funciona..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Stack tecnológico</label>
        <input class="form-input" id="p-stack" placeholder="Ej: C++, Python, React, MySQL"/>
        <small style="color:var(--text-dim);font-size:11px;margin-top:4px;display:block">Separa con comas</small>
      </div>
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-input" id="p-categoria">
          <option value="">Sin categoría</option>
          <option value="1">Estructuras de Datos</option>
          <option value="2">Sistemas Operativos</option>
          <option value="3">Bases de Datos</option>
          <option value="4">Compiladores</option>
          <option value="5">Redes</option>
          <option value="6">Otros</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Archivo (PDF, ZIP, RAR) *</label>
        <input class="form-input" type="file" id="p-archivo" accept=".pdf,.zip,.rar,.tar.gz"/>
        <small style="color:var(--text-dim);font-size:11px;margin-top:4px;display:block">Máximo 20 MB</small>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <a class="btn btn-ghost" href="feed.html">Cancelar</a>
        <button class="btn btn-primary" onclick="publicarProyecto()">Publicar proyecto</button>
      </div>
    </div>

    <!-- FORM ARTÍCULO -->
    <div class="card-flat" id="form-articulo" style="display:none">
      <div class="form-group">
        <label class="form-label">Título del artículo *</label>
        <input class="form-input" id="a-titulo" placeholder="Ej: Guía de árboles AVL para el examen"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-input" id="a-tipo">
          <option value="tutorial">Tutorial técnico</option>
          <option value="guia">Guía de estudio</option>
          <option value="investigacion">Investigación</option>
          <option value="resumen">Resumen de clase</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Contenido *</label>
        <textarea class="form-input" id="a-contenido" rows="10" placeholder="Escribe tu artículo o tutorial aquí..."></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <a class="btn btn-ghost" href="feed.html">Cancelar</a>
        <button class="btn btn-primary" onclick="publicarArticulo()">Publicar artículo</button>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script>
const user = requireAuth();

function setTipo(t) {
  document.getElementById('form-proyecto').style.display = t==='proyecto' ? '' : 'none';
  document.getElementById('form-articulo').style.display = t==='articulo' ? '' : 'none';
  document.getElementById('tipo-proyecto').className = 'btn ' + (t==='proyecto' ? 'btn-primary' : 'btn-ghost');
  document.getElementById('tipo-articulo').className = 'btn ' + (t==='articulo' ? 'btn-primary' : 'btn-ghost');
}

async function publicarProyecto() {
  const titulo      = document.getElementById('p-titulo').value.trim();
  const descripcion = document.getElementById('p-desc').value.trim();
  const stack       = document.getElementById('p-stack').value.trim();
  const categoria   = document.getElementById('p-categoria').value;
  const archivo     = document.getElementById('p-archivo').files[0];
  if (!titulo || !descripcion) return showToast('Título y descripción son obligatorios', 'error');
  if (!archivo) return showToast('Debes adjuntar al menos un archivo', 'error');

  const fd = new FormData();
  fd.append('titulo', titulo);
  fd.append('descripcion', descripcion);
  fd.append('stack_tecnologico', stack);
  fd.append('id_usuario', user.id_usuario);
  if (categoria) fd.append('id_categoria', categoria);
  fd.append('archivo', archivo);

  try {
    await Proyectos.crear(fd);
    showToast('¡Proyecto publicado con éxito!');
    setTimeout(() => window.location.href = 'feed.html', 1500);
  } catch { showToast('Error al publicar. ¿Está el servidor corriendo?', 'error'); }
}

async function publicarArticulo() {
  const titulo    = document.getElementById('a-titulo').value.trim();
  const contenido = document.getElementById('a-contenido').value.trim();
  const tipo      = document.getElementById('a-tipo').value;
  if (!titulo || !contenido) return showToast('Completa todos los campos', 'error');
  try {
    await apiFetch('/articulos', { method:'POST', body: JSON.stringify({ titulo, contenido, tipo, id_usuario: user.id_usuario }) });
    showToast('¡Artículo publicado!');
    setTimeout(() => window.location.href = 'feed.html', 1500);
  } catch { showToast('Error al publicar artículo', 'error'); }
}
</script>
</body>
</html>
